<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5E9D4">
<title>고양이 타워</title>
<meta name="description" content="고양이들을 합쳐서 전설의 사바나를 만드는 물리 퍼즐 게임">
<meta property="og:title" content="고양이 타워">
<meta property="og:description" content="같은 고양이 둘이 닿으면 진화! 10단계 최종 사바나까지 도달해보세요.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- 메인 메뉴 -->
  <section id="menu" class="screen">
    <div class="title-wrap">
      <div class="title-emoji">🐱</div>
      <h1>고양이 타워</h1>
      <p class="tagline">같은 고양이를 합쳐 사바나까지</p>
    </div>
    <div class="best-card">
      <div class="best-label">최고 기록</div>
      <div class="best-value" id="best-score">0</div>
    </div>
    <div class="menu-btns">
      <button id="play-btn" class="btn btn-primary">플레이</button>
      <button id="how-btn" class="btn btn-secondary">조작법 · 진화표</button>
      <button id="rank-btn" class="btn btn-ghost" disabled>랭킹 (준비중)</button>
    </div>
    <footer class="credit">© archerlab</footer>
  </section>

  <!-- 게임 -->
  <section id="game" class="screen hidden">
    <header class="hud">
      <div class="stat score-stat">
        <div class="stat-label">점수</div>
        <div id="score" class="stat-value">0</div>
      </div>
      <div class="stat next-stat">
        <div class="stat-label">다음</div>
        <canvas id="next-cat" width="72" height="72"></canvas>
      </div>
      <button id="pause-btn" class="icon-btn" aria-label="일시정지">❚❚</button>
    </header>
    <div class="field-wrap">
      <canvas id="canvas"></canvas>
    </div>
    <div id="combo-flash" class="combo-flash"></div>
    <footer class="game-hint">좌우로 움직여 탭하면 드롭!</footer>
  </section>

  <!-- 일시정지 -->
  <div id="pause-modal" class="modal hidden">
    <div class="modal-body">
      <h2>일시정지</h2>
      <button id="resume-btn" class="btn btn-primary">계속하기</button>
      <button id="restart-btn" class="btn btn-secondary">다시 시작</button>
      <button id="exit-btn" class="btn btn-ghost">메인 메뉴</button>
    </div>
  </div>

  <!-- 게임 오버 -->
  <div id="gameover-modal" class="modal hidden">
    <div class="modal-body">
      <h2>게임 오버</h2>
      <div class="final-block">
        <div class="final-label">최종 점수</div>
        <div class="final-value" id="final-score">0</div>
        <div id="new-record" class="new-record hidden">🏆 신기록!</div>
      </div>
      <button id="replay-btn" class="btn btn-primary">다시 도전</button>
      <button id="menu-btn" class="btn btn-ghost">메인 메뉴</button>
    </div>
  </div>

  <!-- 조작법 -->
  <div id="how-modal" class="modal hidden">
    <div class="modal-body how-body">
      <h2>조작법</h2>
      <ul class="how-list">
        <li>드래그로 위치 조정, 탭하면 드롭</li>
        <li>같은 종류 둘이 닿으면 합쳐져요</li>
        <li>더 큰 고양이일수록 점수가 커져요</li>
        <li>빨간 점선 위에 너무 오래 쌓이면 게임 오버</li>
      </ul>
      <h3>진화 단계</h3>
      <div id="tier-preview" class="tier-preview"></div>
      <button id="how-close" class="btn btn-primary">닫기</button>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script src="js/cats.js"></script>
<script src="js/game.js"></script>
</body>
</html>
