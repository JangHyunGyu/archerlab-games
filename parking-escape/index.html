<body>
  <a href="https://archerlab.dev" target="_blank" rel="noopener noreferrer" class="archerlab-link" aria-label="ArcherLab 홈">ArcherLab</a>

  <main id="game-shell">
    <div id="game-container" aria-label="주차 퍼즐 게임 화면"></div>

    <header id="hud" class="hud hidden" aria-live="polite">
      <button id="home-btn" class="icon-btn icon-home" type="button" aria-label="메뉴" title="메뉴"><span class="icon-tooltip" aria-hidden="true">메뉴</span></button>
      <div class="stat">
        <span>레벨</span>
        <strong id="level-label">1</strong>
      </div>
      <div id="time-stat" class="stat stat-time">
        <span>TIME</span>
        <strong id="time-label">30</strong>
      </div>
      <div class="stat">
        <span>이동</span>
        <strong id="moves-label">0</strong>
      </div>
      <div class="stat stat-wide">
        <span>차량</span>
        <strong id="left-label">0</strong>
      </div>
    </header>

    <section id="menu" class="menu-screen">
      <div class="menu-art" aria-hidden="true"></div>
      <div class="menu-content">
        <p class="brand-kicker">ARCHERLAB GAMES</p>
        <h1>주차 퍼즐</h1>
        <div class="record-row">
          <div>
            <span>최고 레벨</span>
            <strong id="best-level-label">1</strong>
          </div>
          <div>
            <span>최소 이동</span>
            <strong id="best-moves-label">-</strong>
          </div>
        </div>
        <div class="menu-actions menu-actions--menu">
          <button id="play-btn" class="primary-btn" type="button">시작</button>
          <button id="continue-btn" class="secondary-btn" type="button">이어하기</button>
          <button id="rank-btn" class="secondary-btn" type="button">랭킹</button>
        </div>
      </div>
    </section>

    <section id="loading-screen" class="loading-screen hidden" aria-live="assertive" aria-label="레벨 생성 중">
      <div class="loading-panel">
        <img class="loading-emblem" src="assets/ui/parking-loading-badge.png" alt="" aria-hidden="true" decoding="async">
        <p class="brand-kicker">PARKING LOT</p>
        <strong>Lv <span id="loading-level-label">1</span></strong>
        <div class="loading-orbit" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>

    <section id="complete-modal" class="modal hidden" aria-live="polite">
      <div class="modal-panel">
        <p class="brand-kicker">CLEAR</p>
        <h2 id="clear-title">레벨 클리어</h2>
        <div class="clear-stats">
          <div>
            <span>이동</span>
            <strong id="clear-moves">0</strong>
          </div>
          <div>
            <span>다음</span>
            <strong id="next-level-label">2</strong>
          </div>
          <div>
            <span>통과 레벨</span>
            <strong id="clear-level">0</strong>
          </div>
        </div>
        <div id="rank-submit-row" class="rank-submit-row">
          <input id="nickname-input" type="text" maxlength="20" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="닉네임 (20자)">
          <div class="rank-submit-buttons">
            <button id="submit-rank-btn" class="secondary-btn" type="button">등록</button>
            <button id="skip-rank-btn" class="secondary-btn secondary-btn--ghost" type="button">Skip</button>
          </div>
          <div id="submit-status" class="submit-status"></div>
        </div>
        <div class="menu-actions menu-actions--clear">
          <button id="next-btn" class="primary-btn" type="button">다음</button>
          <button id="modal-menu-btn" class="secondary-btn" type="button">메뉴</button>
          <button id="modal-rank-btn" class="secondary-btn" type="button">랭킹</button>
        </div>
      </div>
    </section>

    <section id="rank-modal" class="modal hidden" aria-live="polite">
      <div class="modal-panel rank-panel">
        <p class="brand-kicker">TOP 20</p>
        <h2>랭킹</h2>
        <div id="rank-content" class="rank-content">
          <div class="rank-loading">불러오는 중...</div>
        </div>
        <button id="rank-close-btn" class="primary-btn" type="button">닫기</button>
      </div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tone@15.1.22/build/Tone.min.js" crossorigin="anonymous"></script>
