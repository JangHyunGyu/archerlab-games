<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slime Volley - 슬라임 배구 | Archerlab Games</title>
    <meta name="description" content="슬라임 배구 - 피카츄 배구 스타일의 멀티플레이어 배구 게임. 1:1부터 4:4까지 온라인 대전! 브라우저에서 바로 플레이.">
    <meta name="keywords" content="슬라임배구, 피카츄배구, 온라인배구게임, 멀티플레이어, slime volleyball, pikachu volleyball, archerlab">
    <meta property="og:title" content="Slime Volley - 슬라임 배구">
    <meta property="og:description" content="슬라임 배구 - 1:1부터 4:4까지 온라인 대전! 봇 연습 모드 지원.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://game.archerlab.dev/slimevolley/">
    <link rel="canonical" href="https://game.archerlab.dev/slimevolley/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-66FS0YCEEM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-66FS0YCEEM');
    </script>
    <link rel="stylesheet" href="css/style.css?v=7">
    <script>
        // 모바일 주소창 높이를 반영한 실제 뷰포트 높이
        function setVH() {
            document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', function() { setTimeout(setVH, 150); });
    </script>
</head>
<body>
    <!-- 세로모드 경고 오버레이 -->
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <p>화면을 가로로 돌려주세요</p>
        <p class="rotate-sub">Please rotate your device</p>
    </div>

    <div id="app">
        <!-- Header -->
        <header id="game-header">
            <a href="../" class="back-link" title="Back to Games">&#8592;</a>
            <h1>Slime Volley</h1>
            <button id="btn-sound" class="icon-btn" title="Toggle Sound">Sound ON</button>
        </header>

        <!-- Error Toast -->
        <div id="error-toast"></div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <div class="menu-container">
                <a href="https://archerlab.dev" target="_blank" class="archerlab-link">archerlab.dev</a>
                <div class="game-logo">
                    <div class="logo-slime blue"></div>
                    <div class="logo-ball"></div>
                    <div class="logo-slime red"></div>
                </div>
                <h2 class="menu-title">Slime Volley</h2>
                <p class="menu-subtitle">Classic Volleyball Battle</p>

                <div class="menu-buttons">
                    <button id="btn-practice" class="btn btn-primary btn-large">
                        <span class="btn-icon">&#9889;</span>
                        <span>혼자 연습</span>
                        <span class="btn-desc">봇 상대 연습 모드</span>
                    </button>
                    <button id="btn-multiplayer" class="btn btn-secondary btn-large">
                        <span class="btn-icon">&#9775;</span>
                        <span>다같이 시합</span>
                        <span class="btn-desc">온라인 멀티플레이어</span>
                    </button>
                </div>

                <div class="controls-guide">
                    <p><strong>Controls</strong></p>
                    <p>Move: <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> or <kbd>A</kbd> <kbd>D</kbd></p>
                    <p>Jump: <kbd>&#8593;</kbd> or <kbd>W</kbd> or <kbd>Space</kbd></p>
                </div>
            </div>
        </div>

        <!-- Practice Setup -->
        <div id="practice-setup" class="screen">
            <div class="panel">
                <h2>Practice Mode</h2>
                <div class="form-group">
                    <label>My Team Size</label>
                    <select id="practice-my-team" class="input-select">
                        <option value="1" selected>1 (Solo)</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bot Team Size</label>
                    <select id="practice-bot-team" class="input-select">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Difficulty</label>
                    <select id="practice-difficulty" class="input-select">
                        <option value="easy">Easy</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button id="btn-back-practice" class="btn btn-ghost">Back</button>
                    <button id="btn-start-practice" class="btn btn-primary">Start!</button>
                </div>
            </div>
        </div>

        <!-- Multiplayer Lobby (방 목록) -->
        <div id="multiplayer-lobby" class="screen">
            <div class="panel panel-wide">
                <h2>온라인 대전</h2>
                <div class="lobby-top">
                    <div class="form-group form-inline">
                        <label>닉네임</label>
                        <input type="text" class="player-name-input input-text" placeholder="이름 입력" maxlength="12">
                    </div>
                    <div class="lobby-actions">
                        <button id="btn-refresh-rooms" class="btn btn-small">새로고침</button>
                        <button id="btn-create-room" class="btn btn-primary btn-small-primary">방 만들기</button>
                    </div>
                </div>
                <div id="room-list" class="room-list">
                    <div class="room-list-empty">방 목록을 불러오는 중...</div>
                </div>
                <div class="form-actions">
                    <button id="btn-back-multiplayer" class="btn btn-ghost">Back</button>
                </div>
            </div>
        </div>

        <!-- Create Room (세트/스코어 설정) -->
        <div id="create-room" class="screen">
            <div class="panel">
                <h2>방 만들기</h2>
                <div class="form-group">
                    <label>세트 수</label>
                    <select id="create-sets" class="input-select">
                        <option value="1" selected>단판 (1세트)</option>
                        <option value="3">3세트 (2선승)</option>
                        <option value="5">5세트 (3선승)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>세트 당 스코어</label>
                    <select id="create-score" class="input-select">
                        <option value="15">15점</option>
                        <option value="21">21점</option>
                        <option value="25" selected>25점</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="create-deuce" checked>
                        듀스 (동점 시 2점 차 승리)
                    </label>
                </div>
                <div class="form-actions">
                    <button id="btn-back-create" class="btn btn-ghost">Back</button>
                    <button id="btn-do-create" class="btn btn-primary">생성</button>
                </div>
            </div>
        </div>

        <!-- Room Screen -->
        <div id="room-screen" class="screen">
            <div class="panel panel-wide">
                <h2>Room</h2>
                <div class="room-code-section">
                    <span class="room-code-label">Room Code:</span>
                    <span id="room-code-display" class="room-code">----</span>
                    <button id="btn-copy-code" class="btn btn-small">Copy</button>
                </div>
                <div id="room-meta" class="room-meta"></div>
                <div id="player-list" class="player-list"></div>
                <div class="chat-section">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input" class="input-text chat-input-field" placeholder="메시지 입력..." maxlength="200">
                        <button id="btn-chat-send" class="btn btn-small">전송</button>
                    </div>
                </div>
                <div class="form-actions">
                    <button id="btn-leave-room" class="btn btn-ghost">Leave</button>
                    <button id="btn-switch-team" class="btn btn-secondary">팀 변경</button>
                    <button id="btn-ready" class="btn btn-secondary">Ready</button>
                    <button id="btn-start-game" class="btn btn-primary" disabled style="display:none">Start Game</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div id="game-canvas-container" class="game-canvas-container">
                <!-- Mobile Controls (overlay) -->
                <div id="mobile-controls" class="mobile-controls">
                    <div id="touch-move-zone" class="touch-zone touch-zone-left">
                        <div class="joystick-visual" id="joystick-move">
                            <div class="joystick-base">
                                <div class="joystick-arrow joystick-arrow-left">&#9664;</div>
                                <div class="joystick-knob" id="joystick-knob"></div>
                                <div class="joystick-arrow joystick-arrow-right">&#9654;</div>
                            </div>
                        </div>
                    </div>
                    <div id="touch-jump-zone" class="touch-zone touch-zone-right">
                        <div class="joystick-visual" id="joystick-jump">
                            <div class="jump-btn-visual">JUMP</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over -->
        <div id="game-over" class="screen">
            <div class="panel game-over-panel">
                <h2 id="game-over-title" class="victory">Victory!</h2>
                <div id="game-over-score" class="game-over-score">0 - 0</div>
                <div id="game-over-sets" class="game-over-sets"></div>
                <div class="form-actions">
                    <button id="btn-gameover-lobby" class="btn btn-ghost">Lobby</button>
                    <button id="btn-play-again" class="btn btn-primary">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Kakao in-app browser redirect -->
    <script>
        (function() {
            var ua = navigator.userAgent || '';
            if (ua.match(/KAKAOTALK/i)) {
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            }
        })();
    </script>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@15/build/Tone.js"></script>

    <!-- Game Scripts -->
    <script src="js/config.js?v=7"></script>
    <script src="js/physics.js?v=7"></script>
    <script src="js/renderer.js?v=7"></script>
    <script src="js/bot.js?v=7"></script>
    <script src="js/sound.js?v=7"></script>
    <script src="js/network.js?v=7"></script>
    <script src="js/lobby.js?v=7"></script>
    <script src="js/main.js?v=7"></script>
</body>
</html>
