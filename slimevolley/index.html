    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        // 모바일 주소창 높이를 반영한 실제 뷰포트 높이
        function setVH() {
            document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', function() { setTimeout(setVH, 150); });

</head>
<body>
    <!-- 세로모드 경고 오버레이 -->
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <p>화면을 가로로 돌려주세요</p>
        <p class="rotate-sub">Please rotate your device</p>
    </div>

    <div id="app">
        <!-- Header -->
        <header id="game-header">
            <a href="../" class="back-link" id="header-back" title="Back to Games">&#8592;</a>
            <h1>Slime Volley</h1>
            <button id="btn-sound" class="icon-btn" title="Toggle Sound">Sound ON</button>
        </header>

        <!-- Error Toast -->
        <div id="error-toast"></div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <div class="menu-container">
                <a href="https://archerlab.dev" target="_blank" rel="noopener noreferrer" class="archerlab-link">🏹 ArcherLab</a>
                <div class="game-logo game-logo-assets">
                    <img class="logo-slime-img logo-slime-blue" src="assets/images/logo-slime-blue.png" alt="" aria-hidden="true">
                    <img class="logo-ball-img" src="assets/images/ball.png" alt="" aria-hidden="true">
                    <img class="logo-slime-img logo-slime-red" src="assets/images/logo-slime-red.png" alt="" aria-hidden="true">
                </div>
                <h2 class="menu-title">Slime Volley</h2>
                <p class="menu-subtitle">Classic Volleyball Battle</p>

                <div class="menu-buttons">
                    <button id="btn-practice" class="btn btn-primary btn-large">
                        <span class="btn-icon">&#9889;</span>
                        <span>혼자 연습</span>
                        <span class="btn-desc">봇 상대 연습 모드</span>
                    </button>
                    <button id="btn-multiplayer" class="btn btn-secondary btn-large">
                        <span class="btn-icon">&#9775;</span>
                        <span>다같이 시합</span>
                        <span class="btn-desc">온라인 멀티플레이어</span>
                    </button>
                </div>

                <div class="controls-guide">
                    <p><strong>Controls</strong></p>
                    <p>Move: <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> or <kbd>A</kbd> <kbd>D</kbd></p>
                    <p>Jump: <kbd>&#8593;</kbd> or <kbd>W</kbd> or <kbd>Space</kbd></p>
                </div>
            </div>
        </div>

        <!-- Practice Setup -->
        <div id="practice-setup" class="screen">
            <div class="panel">
                <h2>Practice Mode</h2>
                <div class="form-group">
                    <label>My Team Size</label>
                    <select id="practice-my-team" class="input-select">
                        <option value="1" selected>1 (Solo)</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bot Team Size</label>
                    <select id="practice-bot-team" class="input-select">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Difficulty</label>
                    <select id="practice-difficulty" class="input-select">
                        <option value="easy">Easy</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button id="btn-back-practice" class="btn btn-ghost">Back</button>
                    <button id="btn-start-practice" class="btn btn-primary">Start!</button>
                </div>
            </div>
        </div>

        <!-- Multiplayer Lobby (방 목록) -->
        <div id="multiplayer-lobby" class="screen">
            <div class="panel panel-wide">
                <h2>온라인 대전</h2>
                <div class="lobby-top">
                    <div class="form-group form-inline">
                        <label>닉네임</label>
                        <input type="text" class="player-name-input input-text" placeholder="이름 입력" maxlength="12">
                    </div>
                    <div class="lobby-actions">
                        <button id="btn-refresh-rooms" class="btn btn-small">새로고침</button>
                        <button id="btn-create-room" class="btn btn-primary btn-small-primary">방 만들기</button>
                    </div>
                </div>
                <div id="room-list" class="room-list">
                    <div class="room-list-empty">방 목록을 불러오는 중...</div>
                </div>
                <div class="form-actions">
                    <button id="btn-back-multiplayer" class="btn btn-ghost">Back</button>
                </div>
            </div>
        </div>

        <!-- Create Room (공개/비밀 선택 + 세트/스코어 설정) -->
        <div id="create-room" class="screen">
            <div class="panel">
                <h2>방 만들기</h2>
                <div class="form-group">
                    <label>방 유형</label>
                    <div class="room-type-selector">
                        <button type="button" id="btn-type-public" class="room-type-btn active" data-type="public">공개방</button>
                        <button type="button" id="btn-type-private" class="room-type-btn" data-type="private">비밀방</button>
                    </div>
                </div>
                <div class="form-group" id="password-group" style="display:none">
                    <label>비밀번호 (숫자 4자리)</label>
                    <input type="tel" id="create-password" class="input-text" placeholder="0000" maxlength="4" pattern="[0-9]*" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>세트 수</label>
                    <select id="create-sets" class="input-select">
                        <option value="1" selected>단판 (1세트)</option>
                        <option value="3">3세트 (2선승)</option>
                        <option value="5">5세트 (3선승)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>세트 당 스코어</label>
                    <select id="create-score" class="input-select">
                        <option value="15">15점</option>
                        <option value="21">21점</option>
                        <option value="25" selected>25점</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="create-deuce" checked>
                        듀스 (동점 시 2점 차 승리)
                    </label>
                </div>
                <div class="form-actions">
                    <button id="btn-back-create" class="btn btn-ghost">Back</button>
                    <button id="btn-do-create" class="btn btn-primary">생성</button>
                </div>
            </div>
        </div>

        <!-- Room Screen -->
        <div id="room-screen" class="screen">
            <div class="panel panel-wide">
                <div class="room-header-section">
                    <h2>Room</h2>
                    <div id="room-type-display" class="room-type-display"></div>
                    <div id="room-meta" class="room-meta"></div>
                </div>
                <div class="room-body">
                    <div id="player-list" class="player-list"></div>
                    <div class="room-sidebar">
                        <div class="chat-section">
                            <div id="chat-messages" class="chat-messages"></div>
                            <div class="chat-input-row">
                                <input type="text" id="chat-input" class="input-text chat-input-field" placeholder="메시지 입력..." maxlength="200">
                                <button id="btn-chat-send" class="btn btn-small">전송</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button id="btn-leave-room" class="btn btn-ghost">Leave</button>
                    <button id="btn-switch-team" class="btn btn-secondary">팀 변경</button>
                    <button id="btn-ready" class="btn btn-secondary">Ready</button>
                    <button id="btn-start-game" class="btn btn-primary" disabled style="display:none">Start Game</button>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Mobile Controls (full screen overlay) -->
            <div id="mobile-controls" class="mobile-controls">
                <div id="touch-move-zone" class="touch-zone touch-zone-left"></div>
                <div id="touch-jump-zone" class="touch-zone touch-zone-right"></div>
                <div class="joystick-visual joystick-visual-left" id="joystick-move">
                    <div class="joystick-base">
                        <div class="joystick-arrow joystick-arrow-left">&#9664;</div>
                        <div class="joystick-knob" id="joystick-knob"></div>
                        <div class="joystick-arrow joystick-arrow-right">&#9654;</div>
                    </div>
                </div>
                <div class="joystick-visual joystick-visual-right" id="joystick-jump">
                    <div class="jump-btn-visual">JUMP</div>
                </div>
            </div>
            <div id="game-canvas-container" class="game-canvas-container"></div>
        </div>

        <!-- Game Over -->
        <div id="game-over" class="screen">
            <div class="panel game-over-panel">
                <h2 id="game-over-title" class="victory">Victory!</h2>
                <div id="game-over-score" class="game-over-score">0 - 0</div>
                <div id="game-over-sets" class="game-over-sets"></div>
                <div id="game-over-mvp" class="game-over-mvp"></div>
                <div class="form-actions">
                    <button id="btn-gameover-lobby" class="btn btn-ghost">Lobby</button>
                    <button id="btn-play-again" class="btn btn-primary">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <h3 id="confirm-message">나가시겠습니까?</h3>
            <div class="form-actions">
                <button id="btn-confirm-no" class="btn btn-ghost">취소</button>
                <button id="btn-confirm-yes" class="btn btn-primary">확인</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="password-modal" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <h3>비밀번호 입력</h3>
            <input type="tel" id="join-password" class="input-text" placeholder="숫자 4자리" maxlength="4" pattern="[0-9]*" inputmode="numeric">
            <div class="form-actions">
                <button id="btn-pw-cancel" class="btn btn-ghost">취소</button>
                <button id="btn-pw-confirm" class="btn btn-primary">입장</button>
            </div>
        </div>
    </div>

    <!-- Host Migration Loading Overlay -->
    <div id="migration-overlay">
        <div class="mig-spinner"></div>
        <div class="mig-title" id="mig-title">호스트 이전 중...</div>
        <div class="mig-subtitle" id="mig-subtitle">잠시만 기다려 주세요</div>
    </div>

    <!-- Kakao in-app browser redirect -->
    <script>
        (function() {
            var ua = navigator.userAgent || '';
            if (ua.match(/KAKAOTALK/i)) {
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
            }
        })();
    </script>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tone@15/build/Tone.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

    <!-- Game Scripts -->
    <script src="js/config.js?v=41"></script>
    <script src="js/physics.js?v=41"></script>
    <script src="js/renderer.js?v=41"></script>
    <script src="js/bot.js?v=41"></script>
    <script src="js/sound.js?v=41"></script>
    <script src="js/webrtc.js?v=41"></script>
    <script src="js/network.js?v=41"></script>
    <script src="js/lobby.js?v=41"></script>
    <script src="js/main.js?v=41"></script>
</body>
</html>
